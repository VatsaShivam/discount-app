name: CI / Build and Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_SERVICE_ID && secrets.RENDER_API_KEY }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering deploy for service $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}' > render_deploy_response.json
          cat render_deploy_response.json

      - name: Setup Python (for Excel update)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install openpyxl

      - name: Update versions.xlsx
        env:
          VERSION: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python scripts/update_versions.py "$VERSION" "deployed" "" "$COMMIT_SHA"

      - name: Commit versions.xlsx
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'ci: record deploy ${{ github.run_number }}'
          file_pattern: versions.xlsx
        env:
          GIT_AUTHOR_NAME: 'github-actions'
          GIT_AUTHOR_EMAIL: 'actions@github.com'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show versions.xlsx contents (CSV)
        run: |
          python - <<'PY'
import openpyxl, csv, sys
wb = openpyxl.load_workbook('versions.xlsx')
ws = wb.active
for row in ws.iter_rows(values_only=True):
    print(','.join([str(c) if c is not None else '' for c in row]))
PY
